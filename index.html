<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Open Above: a cozy hot air balloon wind-drift experience." />
  <title>The Open Above: Balloon Drift</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #bde8ff; color: #f8fbff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #game { width: 100vw; height: 100vh; display: block; touch-action: none; }
    .hud { position: fixed; left: 16px; top: 16px; z-index: 2; width: min(390px, calc(100vw - 32px)); padding: 10px 12px; border-radius: 16px; background: rgba(58, 36, 18, 0.58); color: white; font-size: 12px; line-height: 1.35; pointer-events: none; box-shadow: 0 18px 60px rgba(73,45,20,.22), inset 0 0 0 1px rgba(255,255,255,.2); backdrop-filter: blur(12px); }
    .hud strong { color: #fff2a8; font-weight: 900; letter-spacing: .02em; }
    .hud small { color: rgba(255,255,255,.76); }
    #error { position: fixed; inset: 16px; z-index: 10; overflow: auto; white-space: pre-wrap; padding: 16px; color: #fff1ea; background: rgba(42,4,2,.94); border: 0; border-radius: 18px; box-shadow: 0 22px 80px rgba(0,0,0,.54), inset 0 0 0 1px rgba(255,210,190,.22); }
    #error[hidden] { display: none; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="The Open Above hot air balloon canvas"></canvas>
  <aside class="hud" id="hud" aria-live="polite"><strong>The Open Above</strong><br>Inflating balloon...</aside>
  <pre id="error" hidden></pre>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
