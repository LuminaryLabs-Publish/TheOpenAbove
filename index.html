<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Open Above: a cinematic hot air balloon wind-drift experience powered by Nexus Engine." />
  <title>The Open Above: Balloon Drift</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #080b12; color: #f8fbff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #game { width: 100vw; height: 100vh; display: block; touch-action: none; }
    .hud { position: fixed; left: 16px; top: 16px; z-index: 2; width: min(430px, calc(100vw - 32px)); padding: 10px 12px; border-radius: 16px; background: rgba(30, 20, 14, 0.54); color: white; font-size: 12px; line-height: 1.35; pointer-events: none; box-shadow: 0 18px 70px rgba(20,12,7,.28), inset 0 0 0 1px rgba(255,255,255,.2); backdrop-filter: blur(14px) saturate(1.1); }
    .hud strong { color: #fff2a8; font-weight: 900; letter-spacing: .02em; }
    .hud small { color: rgba(255,255,255,.78); }
    #error { position: fixed; inset: 16px; z-index: 10; overflow: auto; white-space: pre-wrap; padding: 16px; color: #fff1ea; background: rgba(42,4,2,.94); border: 0; border-radius: 18px; box-shadow: 0 22px 80px rgba(0,0,0,.54), inset 0 0 0 1px rgba(255,210,190,.22); }
    #error[hidden] { display: none; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="The Open Above cinematic hot air balloon canvas"></canvas>
  <aside class="hud" id="hud" aria-live="polite"><strong>The Open Above</strong><br>Building cinematic sky...</aside>
  <pre id="error" hidden></pre>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
