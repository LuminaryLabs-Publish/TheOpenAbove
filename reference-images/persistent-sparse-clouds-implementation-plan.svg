<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081018"/><stop offset="1" stop-color="#111c28"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#6fa6d5"/><stop offset=".6" stop-color="#f1bd83"/><stop offset="1" stop-color="#657d48"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity=".35"/></filter>
    <style>
      .title{font:700 38px system-ui,sans-serif;fill:#f5f7fa}.sub{font:500 18px system-ui,sans-serif;fill:#b7c3d0}
      .head{font:700 23px system-ui,sans-serif}.body{font:500 17px system-ui,sans-serif;fill:#e2e8ef}.small{font:500 15px system-ui,sans-serif;fill:#cbd5df}
      .box{fill:#0e1822;stroke:#334657;stroke-width:2;rx:14}.line{stroke:#73879a;stroke-width:2;fill:none}.node{fill:#162333;stroke:#63b3ed;stroke-width:2;rx:10}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="34" y="52" class="title">The Open Above — Persistent Sparse Clouds at All Altitudes</text>
  <text x="34" y="84" class="sub">Implementation plan, required modules, and integration path</text>
  <line x1="32" y1="106" x2="1568" y2="106" stroke="#324251"/>

  <rect x="30" y="128" width="390" height="360" class="box"/>
  <text x="52" y="168" class="head" fill="#63b3ed">1. TARGET EXPERIENCE</text>
  <text x="55" y="208" class="body">✓ Sparse clouds at every altitude</text>
  <text x="55" y="246" class="body">✓ Rolling fog close to terrain</text>
  <text x="55" y="284" class="body">✓ Scattered mid-level cumulus</text>
  <text x="55" y="322" class="body">✓ Thin high cloud and cirrus bands</text>
  <text x="55" y="360" class="body">✓ Layers never fully disappear</text>
  <text x="55" y="398" class="body">✓ Low-resolution volumetric rendering</text>
  <text x="55" y="436" class="body">✓ Terrain-aware fog and visibility</text>

  <rect x="440" y="128" width="650" height="360" class="box"/>
  <text x="462" y="168" class="head" fill="#f6c945">2. HIGH-LEVEL STEPS</text>
  <text x="466" y="208" class="body">1. Restore cloud visibility</text><text x="495" y="234" class="small">Fix composite depth/ordering; keep low-resolution raymarch.</text>
  <text x="466" y="272" class="body">2. Define four sparse altitude layers</text><text x="495" y="298" class="small">Ground fog, low/mid cumulus, high cloud, cirrus.</text>
  <text x="466" y="336" class="body">3. Drive layers from atmosphere features</text><text x="495" y="362" class="small">Cloud-layer, cloud-bank, fog-bank, visibility-zone.</text>
  <text x="466" y="400" class="body">4. Bridge terrain, moisture, and weather</text><text x="495" y="426" class="small">Valley fog, water proximity, altitude response, wind motion.</text>
  <text x="466" y="464" class="body">5. Validate performance and altitude coverage</text>

  <rect x="1110" y="128" width="460" height="360" class="box"/>
  <text x="1132" y="168" class="head" fill="#8bd17c">3. REQUIRED SUBMODULES</text>
  <text x="1136" y="206" class="body">Open Above Visual</text>
  <text x="1160" y="232" class="small">cloud-weather-map-kit</text><text x="1160" y="256" class="small">volumetric-cloud-kit</text><text x="1160" y="280" class="small">cloud-composite-pass</text><text x="1160" y="304" class="small">aerial-perspective-kit</text><text x="1160" y="328" class="small">atmosphere-layer-controller (new)</text>
  <text x="1136" y="366" class="body">World Data</text>
  <text x="1160" y="392" class="small">altitude bands, sparse density floors</text><text x="1160" y="416" class="small">fog, cloud, and cirrus presets</text>
  <text x="1136" y="454" class="body">Validation</text>
  <text x="1160" y="478" class="small">browser boot, altitude sweep, GPU timing</text>

  <rect x="30" y="510" width="800" height="350" class="box"/>
  <text x="52" y="550" class="head" fill="#b992ff">MODULE TREE</text>
  <rect x="310" y="574" width="240" height="48" class="node"/><text x="358" y="605" class="body">The Open Above</text>
  <path d="M430 622V650M170 650H690M170 650V676M430 650V676M690 650V676" class="line"/>
  <rect x="55" y="676" width="230" height="46" class="node"/><text x="103" y="706" class="body">Visual Domain</text>
  <rect x="315" y="676" width="230" height="46" class="node"/><text x="365" y="706" class="body">World Config</text>
  <rect x="575" y="676" width="230" height="46" class="node"/><text x="609" y="706" class="body">NexusEngine</text>
  <text x="66" y="752" class="small">• cloud-weather-map-kit</text><text x="66" y="778" class="small">• volumetric-cloud-kit</text><text x="66" y="804" class="small">• cloud-composite-pass</text><text x="66" y="830" class="small">• atmosphere-layer-controller</text>
  <text x="326" y="752" class="small">• layer presets</text><text x="326" y="778" class="small">• altitude bands</text><text x="326" y="804" class="small">• sparse floors</text><text x="326" y="830" class="small">• terrain reaction rules</text>
  <text x="586" y="752" class="small">• n:world:features:atmosphere</text><text x="586" y="778" class="small">• cloud-layer / cloud-bank</text><text x="586" y="804" class="small">• fog-bank / wind-corridor</text><text x="586" y="830" class="small">• visibility-zone</text>

  <rect x="850" y="510" width="720" height="350" rx="14" fill="url(#sky)" filter="url(#shadow)"/>
  <path d="M850 780 C980 690 1090 760 1200 690 C1320 610 1450 700 1570 620 V860 H850Z" fill="#405b38" opacity=".95"/>
  <path d="M850 830 C1010 760 1140 840 1280 760 C1400 690 1500 770 1570 720 V860 H850Z" fill="#294733"/>
  <g fill="#f8f8f2" opacity=".68"><ellipse cx="980" cy="724" rx="76" ry="20"/><ellipse cx="1110" cy="760" rx="58" ry="17"/><ellipse cx="1390" cy="730" rx="84" ry="22"/></g>
  <g fill="#fff6ea" opacity=".75"><ellipse cx="1050" cy="620" rx="74" ry="22"/><ellipse cx="1310" cy="600" rx="88" ry="25"/></g>
  <g fill="#f9e7d0" opacity=".62"><ellipse cx="1010" cy="545" rx="120" ry="18"/><ellipse cx="1440" cy="540" rx="100" ry="16"/></g>
  <g fill="#fff4e6" opacity=".45"><ellipse cx="1170" cy="565" rx="120" ry="12" transform="rotate(-9 1170 565)"/><ellipse cx="1450" cy="570" rx="95" ry="10" transform="rotate(7 1450 570)"/></g>
  <g transform="translate(1205 665)"><path d="M0 -92 C-52 -85 -72 -25 -42 24 C-24 54 -12 68 0 76 C12 68 24 54 42 24 C72 -25 52 -85 0 -92Z" fill="#d89a2b" stroke="#8a5314" stroke-width="4"/><path d="M0 -88V74M-28 -78C-14 -20 -12 32 0 72M28 -78C14 -20 12 32 0 72" stroke="#7d4310" stroke-width="5" fill="none"/><rect x="-18" y="77" width="36" height="28" rx="4" fill="#6c3b1c"/><line x1="-15" y1="74" x2="-13" y2="82" stroke="#d0b080"/><line x1="15" y1="74" x2="13" y2="82" stroke="#d0b080"/></g>
  <text x="1370" y="548" class="body">High / Cirrus</text><text x="1370" y="610" class="body">Mid Clouds</text><text x="1370" y="745" class="body">Ground Fog</text>
  <line x1="1325" y1="544" x2="1360" y2="544" stroke="#fff"/><line x1="1325" y1="606" x2="1360" y2="606" stroke="#fff"/><line x1="1325" y1="741" x2="1360" y2="741" stroke="#fff"/>
</svg>